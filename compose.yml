services:
  bookstack-db:
    image: mariadb:latest
    container_name: bookstack-db-ctr
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${BOOKSTACK_DB_NAME}
      MARIADB_USER: ${BOOKSTACK_DB_USER}
      MARIADB_PASSWORD: ${BOOKSTACK_DB_PASSWORD}
    volumes:
      - bookstack-db-data:/var/lib/mysql
    networks:
      - bookstack_internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  bookstack-app:
    image: lscr.io/linuxserver/bookstack:latest
    container_name: bookstack-app-ctr
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${TZ}
      APP_URL: ${BOOKSTACK_APP_URL}
      APP_KEY: ${BOOKSTACK_APP_KEY}
      DB_HOST: ${BOOKSTACK_DB_HOST}
      DB_PORT: ${BOOKSTACK_DB_PORT}
      DB_DATABASE: ${BOOKSTACK_DB_NAME}
      DB_USERNAME: ${BOOKSTACK_DB_USER}
      DB_PASSWORD: ${BOOKSTACK_DB_PASSWORD}
    volumes:
      - bookstack-app-config:/config
    networks:
      - bookstack_internal
    depends_on:
      bookstack-db:
        condition: service_healthy

  bookstack-proxy:
    image: nginx:latest
    container_name: bookstack-proxy-ctr
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./proxy/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - bookstack_internal
    depends_on:
      - bookstack-app

volumes:
  bookstack-db-data:
  bookstack-app-config:

networks:
  bookstack_internal:
    name: bookstack_internal
    driver: bridge