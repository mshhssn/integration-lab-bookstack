name: Compose Validation

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-compose-stack:
    name: Validate Compose Delivery Package
    runs-on: ubuntu-latest
    
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show Docker version
        run: docker --version

      - name: Show Docker Compose version
        run: docker compose version

      - name: List files in repository
        run: ls -la

      - name: Verify required files
        run: |
          test -f compose.yml
          test -f .env.example
          test -f proxy/nginx.conf
          test -f proxy/conf.d/default.conf
          test -f README.md

      - name: Ensure local .env is not committed
        run: |
          if git ls-files --error-unmatch .env >/dev/null 2>&1; then
            echo ".env must not be committed"
            exit 1
          fi
          echo ".env is not tracked"

      - name: Ensure .env.example does not contain actual secrets
        run: |
          if grep -E 'BOOKSTACK_DB_PASSWORD=|MARIADB_ROOT_PASSWORD=' .env.example; then
            echo ".env.example contains actual secrets"
            exit 1
          fi
          echo "No actual secrets found in .env.example"


      - name: Ensure .env.example does not contain actual secrets
        run: |
          if grep -E 'BOOKSTACK_DB_PASSWORD=.+|BOOKSTACK_DB_PASSWORT=.+|MARIADB_ROOT_PASSWORD=.+' .env.example; then
            echo ".env.example contains actual secrets"
            exit 1
          fi
          echo "No actual secrets found in .env.example"      
    
      - name: Ensure compose.yml does not contain hardcoded secrets
        run: |
          if grep -E 'BOOKSTACK_DB_PASSWORD=|MARIADB_ROOT_PASSWORD=' compose.yml; then
            echo "compose.yml contains hardcoded secrets"
            exit 1
          fi
          echo "No hardcoded secrets found in compose.yml"

      - name: Ensure proxy configuration does not contain hardcoded secrets
        run: |
          if grep -E 'BOOKSTACK_DB_PASSWORD=|MARIADB_ROOT_PASSWORD=' proxy/nginx.conf proxy/conf.d/default.conf; then
            echo "Proxy configuration contains hardcoded secrets"
            exit 1
          fi
          echo "No hardcoded secrets found in proxy configuration"

      - name: Ensure compose images are not using 'latest' tag
        run: |
          if grep -nE 'image:.*:latest' compose.yml; then
            echo "latest tag is not allowed in compose.yml"
            exit 1
          fi
          echo "No latest image tags found"

      - name: Validate required env example keys
        run: |
          required_keys=(
            TZ
            BOOKSTACK_APP_URL
            BOOKSTACK_APP_KEY
            BOOKSTACK_DB_HOST
            BOOKSTACK_DB_PORT
            BOOKSTACK_DB_NAME
            BOOKSTACK_DB_USER
            BOOKSTACK_DB_PASSWORD
            MARIADB_ROOT_PASSWORD
          )

          for var in "${required_vars[@]}"; do
            if ! grep -q "^${var}=" .env.example; then
              echo "Missing required variable in .env.example: ${var}"
              exit 1
            fi
          done

          echo ".env.example contains all required variables"

      - name: Validate proxy upstream targets
        run: |
          if ! grep -q 'proxy_pass http://bookstack-app:80;' proxy/conf.d/default.conf; then
            echo "Proxy upstream does not point to expected bookstack-app service"
            exit 1
          fi

          if ! grep -q 'location = /health' proxy/conf.d/default.conf; then
            echo "Proxy health endpoint is missing"
            exit 1
          fi

          echo "Proxy configuration looks plausible"

      - name: Validate README operational sections
        run: |
          required_sections=(
            "Voraussetzungen"
            "Konfiguration"
            "Rollout"
            "Smoke Test"
            "Persistenz"
          )

          for section in "${required_sections[@]}"; do
            if ! grep -q "$section" README.md; then
              echo "README missing required section: $section"
              exit 1
            fi
          done

          echo "README contains required operational sections"

      - name: Prepare CI environment file
        run: |
          cp .env.example .env

          APP_KEY="base64:$(openssl rand -base64 32)"

          sed -i 's|^BOOKSTACK_APP_URL=.*|BOOKSTACK_APP_URL=http://localhost:8080|' .env
          sed -i "s|^BOOKSTACK_APP_KEY=.*|BOOKSTACK_APP_KEY=${APP_KEY}|" .env
          sed -i 's|^BOOKSTACK_DB_HOST=.*|BOOKSTACK_DB_HOST=bookstack-db|' .env
          sed -i 's|^BOOKSTACK_DB_PORT=.*|BOOKSTACK_DB_PORT=3306|' .env
          sed -i 's|^BOOKSTACK_DB_NAME=.*|BOOKSTACK_DB_NAME=bookstack|' .env
          sed -i 's|^BOOKSTACK_DB_USER=.*|BOOKSTACK_DB_USER=bookstack|' .env
          sed -i 's|^BOOKSTACK_DB_PASSWORD=.*|BOOKSTACK_DB_PASSWORD=bookstack|' .env
          sed -i 's|^MARIADB_ROOT_PASSWORD=.*|MARIADB_ROOT_PASSWORD=root|' .env

      - name: Validate rendered Compose configuration
        run: |
          docker compose -f compose.yml config

      - name: Start stack
        run: |
          docker compose -f compose.yml up -d

      - name: Show stack status
        run: |
          docker compose -f compose.yml ps

      - name: Wait for proxy health endpoint
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for health endpoint..."
            sleep 5
          done

          echo "Health check failed"
          docker compose -f compose.yml logs
          exit 1

      - name: Check application HTTP response
        run: |
          curl -I http://localhost:8080/

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -f compose.yml logs --tail=200

      - name: Stop stack
        if: always()
        run: |
          docker compose -f compose.yml down --volumes --remove-orphans