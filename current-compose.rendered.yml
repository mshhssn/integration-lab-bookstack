name: bookstacklab
services:
  bookstack-app:
    container_name: bookstack-app-ctr
    depends_on:
      bookstack-db:
        condition: service_healthy
        required: true
    environment:
      APP_KEY: base64:tusbAlaRtf4sJ+H9o39U+weGQKf3fjc2D2neZ+Rdi4Q=
      APP_URL: http://localhost:8080
      BOOKSTACK_APP_KEY: base64:tusbAlaRtf4sJ+H9o39U+weGQKf3fjc2D2neZ+Rdi4Q=
      BOOKSTACK_APP_URL: http://localhost:8080
      BOOKSTACK_DB_HOST: bookstack-db
      BOOKSTACK_DB_NAME: bookstack
      BOOKSTACK_DB_PASSWORD: password
      BOOKSTACK_DB_PORT: "3306"
      BOOKSTACK_DB_USER: user1@gmail.com
      COMPOSE_PROJECT_NAME: bookstacklab
      DB_DATABASE: bookstack
      DB_HOST: bookstack-db
      DB_PASSWORD: password
      DB_PORT: "3306"
      DB_USERNAME: user1@gmail.com
      MARIADB_ROOT_PASSWORD: root
      TZ: Europe/Berlin
    image: lscr.io/linuxserver/bookstack:latest
    networks:
      bookstack_internal: null
    restart: unless-stopped
    volumes:
      - type: volume
        source: bookstack-app-config
        target: /config
        volume: {}
  bookstack-db:
    container_name: bookstack-db-ctr
    environment:
      BOOKSTACK_APP_KEY: base64:tusbAlaRtf4sJ+H9o39U+weGQKf3fjc2D2neZ+Rdi4Q=
      BOOKSTACK_APP_URL: http://localhost:8080
      BOOKSTACK_DB_HOST: bookstack-db
      BOOKSTACK_DB_NAME: bookstack
      BOOKSTACK_DB_PASSWORD: password
      BOOKSTACK_DB_PORT: "3306"
      BOOKSTACK_DB_USER: user1@gmail.com
      COMPOSE_PROJECT_NAME: bookstacklab
      MARIADB_DATABASE: bookstack
      MARIADB_PASSWORD: password
      MARIADB_ROOT_PASSWORD: root
      MARIADB_USER: user1@gmail.com
      TZ: Europe/Berlin
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      timeout: 5s
      interval: 10s
      retries: 12
      start_period: 20s
    image: mariadb:latest
    networks:
      bookstack_internal: null
    restart: unless-stopped
    volumes:
      - type: volume
        source: bookstack-db-data
        target: /var/lib/mysql
        volume: {}
  bookstack-proxy:
    container_name: bookstack-proxy-ctr
    depends_on:
      bookstack-app:
        condition: service_started
        required: true
    image: nginx:latest
    networks:
      bookstack_internal: null
    ports:
      - mode: ingress
        target: 80
        published: "8080"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /home/msh/labs/weiterbildung/03_docker/integration-lab-bookstack/proxy/nginx.conf
        target: /etc/nginx/nginx.conf
        read_only: true
        bind: {}
      - type: bind
        source: /home/msh/labs/weiterbildung/03_docker/integration-lab-bookstack/proxy/conf.d/default.conf
        target: /etc/nginx/conf.d/default.conf
        bind: {}
networks:
  bookstack_internal:
    name: bookstack_internal
    driver: bridge
volumes:
  bookstack-app-config:
    name: bookstacklab_bookstack-app-config
  bookstack-db-data:
    name: bookstacklab_bookstack-db-data
